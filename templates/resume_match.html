{% extends "base.html" %}
{% load static %}
{% block content %}
    <body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">简历匹配</div>
                    <div class="layui-card-body">
                        <div class="layui-form" lay-filter="">
                            <div class="layui-form-item">
                                <label class="layui-form-label">上传简历</label>
                                <div class="layui-input-block">
                                    <form action="/upload_resume/" method="post" enctype="multipart/form-data">
                                        {% csrf_token %}
                                        <div class="layui-upload">
                                            <button type="button" class="layui-btn" id="upload_resume">选择文件</button>
                                            <div class="layui-upload-list">
                                                <input type="file" name="resume" id="resume_file" accept=".txt,.pdf,.docx" style="display: none;">
                                                <p id="upload_text">请选择要上传的简历文件 (支持txt, pdf, docx格式)</p>
                                            </div>
                                        </div>
                                        <br>
                                        <button class="layui-btn" type="submit" lay-submit lay-filter="upload_form">开始匹配</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
{% endblock %}

{% block js %}
    <script>
        layui.config({
            base: '{% static "layuiadmin/" %}' //静态资源所在路径
        }).extend({
            index: 'lib/index' //主入口模块
        }).use(['index', 'form', 'upload'], function () {
            var $ = layui.$,
                layer = layui.layer
                , form = layui.form
                , upload = layui.upload;

            // 监听文件选择
            $('#upload_resume').on('click', function() {
                $('#resume_file').click();
            });

            $('#resume_file').on('change', function() {
                var file = this.files[0];
                if (file) {
                    $('#upload_text').text('已选择文件: ' + file.name);
                }
            });

            form.on('submit(upload_form)', function (data) {
                var file = $('#resume_file')[0].files[0];
                if (!file) {
                    layer.msg("请选择要上传的简历文件！");
                    return false;
                }
                
                // 显示加载提示
                var loading = layer.load(2, {
                    shade: [0.3, '#333'],
                    content: '正在解析简历...',
                    time: 0
                });
                
                // 构建表单数据
                var formData = new FormData();
                formData.append('resume', file);
                formData.append('csrfmiddlewaretoken', $('input[name="csrfmiddlewaretoken"]').val());
                
                // 发送异步请求
                $.ajax({
                    url: '/upload_resume/',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        if (response.code === 0) {
                            var taskId = response.task_id;
                            console.log('任务ID:', taskId);
                            
                            // 开始轮询任务状态
                            var pollingInterval = setInterval(function() {
                                $.get('/check_task_status/', { task_id: taskId }, function(statusResponse) {
                                    if (statusResponse.code === 0) {
                                        if (statusResponse.status === 'completed') {
                                            clearInterval(pollingInterval);
                                            layer.close(loading);
                                            
                                            // 跳转到结果页面
                                            window.location.href = '/match_report/';
                                        } else if (statusResponse.status === 'processing') {
                                            console.log('任务处理中...');
                                        }
                                    } else {
                                        clearInterval(pollingInterval);
                                        layer.close(loading);
                                        layer.msg('任务处理失败：' + statusResponse.msg, { icon: 5 });
                                    }
                                }).fail(function() {
                                    clearInterval(pollingInterval);
                                    layer.close(loading);
                                    layer.msg('检查任务状态失败，请刷新页面重试', { icon: 5 });
                                });
                            }, 2000); // 每2秒轮询一次
                        } else {
                            layer.close(loading);
                            layer.msg('上传失败：' + response.msg, { icon: 5 });
                        }
                    },
                    error: function() {
                        layer.close(loading);
                        layer.msg('上传失败，请重试', { icon: 5 });
                    }
                });
                
                return false;
            });
        });
    </script>
{% endblock %}
