{% extends "admin/change_list.html" %}

{% block content %}
    <div style="padding: 20px; border: 1px solid #e6e6e6; margin-bottom: 20px; background-color: #f9f9f9; border-radius: 4px;">
        <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #333;">爬虫设置</h3>
        <form id="spider_form" style="max-width: 600px;">
            <div style="margin-bottom: 15px;">
                <label style="display: inline-block; width: 80px; font-weight: bold;">关键字：</label>
                <input type="text" name="key_word" style="width: 300px; padding: 6px 12px; border: 1px solid #dcdfe6; border-radius: 4px;" 
                       placeholder="输入需要爬取的职位信息如：java工程师">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: inline-block; width: 80px; font-weight: bold;">城市选择：</label>
                <select name="city" style="width: 300px; padding: 6px 12px; border: 1px solid #dcdfe6; border-radius: 4px;">
                    <option value="">请选择一个城市</option>
                    <option value="北京">北京</option>
                    <option value="上海">上海</option>
                    <option value="天津">天津</option>
                    <option value="重庆">重庆</option>
                    <option value="广州">广州</option>
                    <option value="深圳">深圳</option>
                    <option value="苏州">苏州</option>
                    <option value="南京">南京</option>
                    <option value="杭州">杭州</option>
                    <option value="大连">大连</option>
                    <option value="成都">成都</option>
                    <option value="武汉">武汉</option>
                    <option value="西安">西安</option>
                </select>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: inline-block; width: 80px; font-weight: bold;">网站选择：</label>
                <label style="margin-right: 20px;"><input type="radio" name="role" value="猎聘网" checked> 猎聘网</label>
                <label><input type="radio" name="role" value="智联招聘"> 智联招聘</label>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: inline-block; width: 80px; font-weight: bold;">页数选择：</label>
                <select name="page" style="width: 300px; padding: 6px 12px; border: 1px solid #dcdfe6; border-radius: 4px;">
                    <option value="">请选择需要爬取页数数量</option>
                    <option value="1">1页</option>
                    <option value="2">2页</option>
                    <option value="3">3页</option>
                    <option value="4">4页</option>
                    <option value="5">5页</option>
                    <option value="6">6页</option>
                    <option value="7">7页</option>
                    <option value="8">8页</option>
                    <option value="9">9页</option>
                    <option value="10">10页</option>
                </select>
            </div>
            <div style="margin-top: 20px;">
                {% if spider_code == 0 %}
                    <button type="button" id="start_spider" style="padding: 8px 20px; background-color: #409eff; color: white; border: none; border-radius: 4px; cursor: pointer;">开始爬取</button>
                {% else %}
                    <button type="button" disabled style="padding: 8px 20px; background-color: #c0c4cc; color: white; border: none; border-radius: 4px;">正在爬取,请稍后...</button>
                {% endif %}
            </div>
        </form>
    </div>

    {{ block.super }}

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#start_spider').click(function() {
                var key_word = $('input[name="key_word"]').val();
                var city = $('select[name="city"]').val();
                var role = $('input[name="role"]:checked').val();
                var page = $('select[name="page"]').val();

                if (!key_word) {
                    alert('关键字不能为空！');
                    return;
                }
                if (!city) {
                    alert('城市不能为空！');
                    return;
                }
                if (!page) {
                    alert('页数不能为空！');
                    return;
                }

                var button = $(this);
                button.text('正在爬取请稍后...');
                button.attr('disabled', true);

                $.ajax({
                    type: 'POST',
                    url: '/start_spider/',
                    data: {key_word: key_word, city: city, role: role, page: page},
                    success: function(res) {
                        alert(res.msg);
                        button.text('开始爬取');
                        button.attr('disabled', false);
                        // 刷新页面以更新爬虫状态
                        setTimeout(function() {
                            window.location.reload();
                        }, 1000);
                    },
                    error: function(response) {
                        alert('请求失败，请重试');
                        button.text('开始爬取');
                        button.attr('disabled', false);
                    }
                });
            });
        });
    </script>
{% endblock %}
